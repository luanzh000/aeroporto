<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel de Controle - Voo Seguro</title>
    <link rel="stylesheet" href="etyle.css">
</head>
<body>

    <div class="painel-combustivel">
        <h2>Operação Caixa-Preta ✈️</h2>
        <p id="codigoVooDisplay">Aguardando Voo...</p>
        
        <div class="visor-digital">
            <span id="painelCombustivel">Combustível: 100%</span>
        </div>

        <div class="botoes-comando">
            <button id="btnGastar" class="btn-perigo">Gastar (Voar) 🛫</button>
            <button id="btnAbastecerSeguro" class="btn-sucesso">Abastecer 10% ⛽</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
